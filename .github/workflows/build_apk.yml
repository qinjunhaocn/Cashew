name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # flutter-version: '3.x.x' # Optional, defaults to latest stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: budget

      - name: Build Debug APK
        run: flutter build apk --debug
        working-directory: budget

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: budget/build/app/outputs/flutter-apk/app-debug.apk
